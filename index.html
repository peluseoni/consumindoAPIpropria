<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alunos do 4INFO3</title>
    <link id="css" rel="stylesheet" href="light.css">
</head>
<body>
    <label id="label-select"> Temas
        <select id="select-tema">
           <option id="option-claro" value="claro">Claro</option>
           <option id="option-escuro" value="escuro">Escuro</option>
           <option id="option-cyberpunk" value="cyberpunk">Cyberpunk</option>
           <option id="option-thewalkingdead" value="thewalkingdead">The Walking Dead</option>   
        </select>
    </label>
    <h1 id="titulo">Alunos do 4INFO3</h1>
    <h2 id="subtitulo">Inserir novo aluno:</h2>
    <label id="label-input-nome">
        Nome:
        <input type="text" id="input-nome">
    </label>
    <label id="label-input-idade">
        Idade:
        <input type="number" id="input-idade">
    </label>
    <label id="label-input-telefone">
        Telefone:
        <input type="tel" id="input-telefone" placeholder="(00) 00000-0000">
    </label>
    <input type="button" id="botao-enviar" value="Enviar"><br>
    <span id="feedback"></span>
    <ul id="lista-alunos"></ul>

    <script src="script.js"></script>
</body>
</html>
